<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reincrew.AI - Student Dashboard</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:transparent;color:#1e293b;min-height:100vh}

    /* Navbar */
    .navbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:#ffffff;border-bottom:1px solid #e2e8f0}
    .navbar .logo{font-size:1.3rem;font-weight:700;color:#0f172a}
    .navbar .logo span{color:#7a9ebf}
    .nav-links{display:flex;gap:20px;align-items:center}
    .nav-links a{color:#64748b;text-decoration:none;font-size:.9rem;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:#7a9ebf}
    .nav-links .logout{color:#ff6b6b;cursor:pointer;background:none;border:none;font-size:.9rem;font-family:inherit}
    .nav-links .logout:hover{color:#ff4444}

    /* Layout */
    .main{max-width:1100px;margin:0 auto;padding:32px 24px}
    .welcome{margin-bottom:32px}
    .page-header h1{font-size:1.6rem;color:#0f172a}
    .welcome p{color:#64748b;font-size:.95rem}

    /* Profile Card */
    .stat-card{background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
    .stat-card h3{color:#0f172a;margin-bottom:16px;font-size:1.1rem}
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .profile-item{display:flex;flex-direction:column;gap:2px}
    .profile-item .label{font-size:.85rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
    .profile-item .value{font-size:.95rem;color:#1e293b}

    /* Skills */
    .skills-section{background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:28px}
    .skills-section h3{color:#0f172a;margin-bottom:16px;font-size:1.1rem}
    .skills-list{display:flex;flex-wrap:wrap;gap:8px}
    .user-badge{background:#7a9ebf11;color:#7a9ebf;padding:4px 12px;border-radius:12px;font-size:.8rem;font-weight:600}
    .no-skills{color:#64748b;font-size:.9rem}

    /* Actions */
    .actions{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
    .action-btn{padding:12px 24px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;text-decoration:none;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
    .action-btn.primary{background:#7a9ebf;color:#fff}
    .action-btn.primary:hover{background:#5a52e0}
    .action-btn.secondary{background:transparent;color:#7a9ebf;border:1px solid #7a9ebf}
    .action-btn.secondary:hover{background:#7a9ebf22}

    /* Interview History */
    .history{background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;padding:24px}
    .history h3{color:#0f172a;margin-bottom:20px;font-size:1.1rem}
    .interview-list{display:flex;flex-direction:column;gap:12px}
    .resume-card{background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:32px}
    .resume-icon{width:56px;height:56px;background:#7a9ebf11;color:#7a9ebf;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
    .resume-info .title{font-weight:700;color:#0f172a;margin-bottom:4px}
    .resume-info .meta{font-size:.85rem;color:#64748b}
    .interview-card{background:transparent;border:1px solid #e2e8f0;border-radius:10px;padding:18px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s;cursor:pointer}
    .interview-card:hover{border-color:#7a9ebf44}
    .interview-info h4{font-size:.95rem;color:#0f172a;margin-bottom:4px}
    .interview-info p{font-size:.82rem;color:#64748b}
    .interview-meta{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
    .score-badge{font-size:1.1rem;font-weight:700;padding:4px 12px;border-radius:6px}
    .score-high{background:#dcfce7;color:#166534}
    .score-mid{background:#fef9c3;color:#854d0e}
    .score-low{background:#fee2e2;color:#991b1b}
    .btn-outline{background:none;border:1px solid #cbd5e1;color:#64748b;padding:8px 16px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-outline:hover{background:#f1f5f9;color:#0f172a;border-color:#7a9ebf}
    .status-badge{font-size:.75rem;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    .status-completed{background:#dcfce7;color:#166534}
    .status-in_progress{background:#fef9c3;color:#854d0e}
    .empty-state{text-align:center;padding:40px 20px;color:#64748b}
    .empty-state p{margin-bottom:16px;font-size:.95rem}

    /* Loading */
    .loading{text-align:center;padding:40px;color:#888}
    .spinner{display:inline-block;width:24px;height:24px;border:3px solid #2a2a3a;border-radius:50%;border-top-color:#7a9ebf;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .msg{padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}
    .msg.error{background:#2d1520;border:1px solid #5c2030;color:#ff6b6b;display:block}

    @media(max-width:640px){
      .navbar{padding:12px 16px;flex-direction:column;gap:10px}
      .profile-grid{grid-template-columns:1fr}
      .interview-card{flex-direction:column;align-items:flex-start;gap:12px}
      .interview-meta{align-items:flex-start;flex-direction:row;gap:10px}
      .actions{flex-direction:column}
      .action-btn{width:100%;justify-content:center}
    }
  



    /* The Darker SVG Waves */
    .breeze-waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40vh;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23436d93" fill-opacity="0.3" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,197.3C960,213,1056,203,1152,176C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path><path fill="%232c4a67" fill-opacity="0.15" d="M0,96L48,117.3C96,139,192,181,288,181.3C384,181,480,139,576,128C672,117,768,139,864,149.3C960,160,1056,160,1152,144C1248,128,1344,96,1392,80L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
      background-size: 1440px 100%;
      animation: waveMotion 20s linear infinite;
      z-index: -1;
      pointer-events: none;
    }
    @keyframes waveMotion {
      0% { background-position: 0 0; }
      100% { background-position: 1440px 0; }
    }
    .breeze-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(-45deg, #f2f5f9, #e8edf4, #dbe4ee, #f2f5f9);
      background-size: 400% 400%;
      animation: breezeFlow 15s ease infinite;
      z-index: -5;
    }
    @keyframes breezeFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

</style>

</head>
<body>
  
  <div class="breeze-bg"></div>
  <div class="breeze-waves"></div>


  
  
  <nav class="navbar">
    <div class="logo">
        <img src="logo.png" class="logo-icon" alt="Logo">
        Reincrew<span>.AI</span></div>
    <div class="nav-links">
      <a href="student-dashboard.html" class="active">Dashboard</a>
      <a href="profile.html">Profile</a>
      <a href="resume.html">Resume</a>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="main">
    <div class="welcome">
      <h2 id="welcome-name">Welcome back</h2>
      <p>Your AI interview dashboard</p>
    </div>

    <div id="error-msg" class="msg"></div>

    <!-- Profile Card -->
    <div class="profile-card" id="profile-section">
      <h3>Profile Info</h3>
      <div class="loading" id="profile-loading"><div class="spinner"></div></div>
      <div class="profile-grid" id="profile-grid" style="display:none">
        <div class="profile-item"><span class="label">Name</span><span class="value" id="p-name">-</span></div>
        <div class="profile-item"><span class="label">Email</span><span class="value" id="p-email">-</span></div>
        <div class="profile-item"><span class="label">College</span><span class="value" id="p-college">-</span></div>
        <div class="profile-item"><span class="label">Domain</span><span class="value" id="p-domain">-</span></div>
        <div class="profile-item"><span class="label">Experience</span><span class="value" id="p-exp">-</span></div>
        <div class="profile-item"><span class="label">Resume</span><span class="value" id="p-resume">-</span></div>
      </div>
    </div>

    <!-- Skills -->
    <div class="skills-section" id="skills-section">
      <h3>Resume Skills</h3>
      <div id="skills-container" class="skills-list">
        <span class="no-skills">Upload a resume to see extracted skills</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <a href="camera.html" class="action-btn primary">Start New Interview</a>
      <a href="resume.html" class="action-btn secondary">Upload Resume (Optional)</a>
    </div>

    <!-- Interview History -->
    <div class="history">
      <h3>Interview History</h3>
      <div class="loading" id="history-loading"><div class="spinner"></div></div>
      <div class="interview-list" id="interview-list" style="display:none"></div>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:5555';
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const onboarded = localStorage.getItem('onboarded');

    // Auth guard
    if (!token) { window.location.href = 'login.html'; }
    else if (onboarded === '0') { window.location.href = 'onboarding.html'; }
    else if (role === 'admin') { window.location.href = 'admin-dashboard.html'; }

    document.getElementById('welcome-name').textContent = 'Welcome, ' + (localStorage.getItem('userName') || 'Student');

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    function handleUnauthorized(res) {
      if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return true; }
      return false;
    }

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.className = 'msg error';
    }

    function formatDate(d) {
      if (!d) return '-';
      const dt = new Date(d);
      return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        + ' ' + dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
    }

    function scoreClass(s) {
      if (s === null || s === undefined) return '';
      if (s >= 7) return 'score-high';
      if (s >= 4) return 'score-mid';
      return 'score-low';
    }

    // Fetch profile
    async function loadProfile() {
      try {
        const res = await fetch(API + '/student/profile', { headers: authHeaders() });
        if (handleUnauthorized(res)) return;
        const data = await res.json();
        if (!data.success) { showError(data.error); return; }

        const p = data.data;
        document.getElementById('p-name').textContent = p.name || '-';
        document.getElementById('p-email').textContent = p.email || '-';
        document.getElementById('p-college').textContent = p.college || 'Not specified';
        document.getElementById('p-domain').textContent = p.domain || 'Not analysed yet';
        document.getElementById('p-exp').textContent = p.experience || 'Not analysed yet';
        document.getElementById('p-resume').textContent = p.resumeUploaded ? 'Uploaded' : 'Not uploaded';

        // Skills
        const container = document.getElementById('skills-container');
        if (p.skills && p.skills.length > 0) {
          container.innerHTML = p.skills.map(s => '<span class="skill-tag">' + s + '</span>').join('');
        }

        document.getElementById('profile-loading').style.display = 'none';
        document.getElementById('profile-grid').style.display = 'grid';
      } catch {
        showError('Cannot connect to server.');
      }
    }

    // Fetch interviews
    async function loadInterviews() {
      try {
        const res = await fetch(API + '/student/interviews', { headers: authHeaders() });
        if (handleUnauthorized(res)) return;
        const data = await res.json();
        document.getElementById('history-loading').style.display = 'none';

        const list = document.getElementById('interview-list');
        list.style.display = 'flex';

        if (!data.success || data.data.interviews.length === 0) {
          list.innerHTML = '<div class="empty-state"><p>No interviews yet. Start your first AI interview!</p></div>';
          return;
        }

        list.innerHTML = data.data.interviews.map(iv => {
          const scoreHtml = iv.score !== null
            ? '<span class="score-badge ' + scoreClass(iv.score) + '">' + iv.score + '/10</span>'
            : '<span class="score-badge" style="background:#1e1e2e;color:#888">-</span>';
          const statusCls = 'status-' + iv.status;
          return '<div class="interview-card" onclick="viewInterview(' + iv.interviewId + ',\'' + iv.status + '\')">'
            + '<div class="interview-info">'
            + '<h4>Interview #' + iv.interviewId + '</h4>'
            + '<p>' + iv.questionsAnswered + '/' + iv.questionsAsked + ' questions answered &middot; ' + formatDate(iv.date) + '</p>'
            + (iv.summary ? '<p style="margin-top:4px;color:#bbb;font-size:.82rem">' + iv.summary + '</p>' : '')
            + '</div>'
            + '<div class="interview-meta">'
            + scoreHtml
            + '<span class="status-badge ' + statusCls + '">' + iv.status.replace('_',' ') + '</span>'
            + '</div></div>';
        }).join('');
      } catch {
        showError('Cannot load interviews.');
      }
    }

    function viewInterview(id, status) {
      if (status === 'completed') {
        window.location.href = 'summary.html?id=' + id;
      }
    }

    loadProfile();
    loadInterviews();
  </script>
</body>
</html>
