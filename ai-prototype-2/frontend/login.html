<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reincrew.AI - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7a9ebf;
      --secondary: #c3d6e5;
      --bg: #faf9f7;
      --card-bg: #ffffff;
      --text: #111827;
      --text-muted: #64748b;
      --border: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(0, 0, 0, 0.02);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Theme */
    .breeze-bg {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(-45deg, #f2f5f9, #e8edf4, #dbe4ee, #f2f5f9);
      background-size: 400% 400%;
      animation: breezeFlow 15s ease infinite;
      z-index: -5;
    }
    @keyframes breezeFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .breeze-waves {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23436d93" fill-opacity="0.3" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,197.3C960,213,1056,203,1152,176C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path><path fill="%232c4a67" fill-opacity="0.15" d="M0,96L48,117.3C96,139,192,181,288,181.3C384,181,480,139,576,128C672,117,768,139,864,149.3C960,160,1056,160,1152,144C1248,128,1344,96,1392,80L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
      background-size: 1440px 100%;
      animation: waveMotion 20s linear infinite;
      z-index: -1;
      pointer-events: none;
    }
    @keyframes waveMotion {
      0% { background-position: 0 0; }
      100% { background-position: 1440px 0; }
    }

    .back-link {
        position: absolute; top: 40px; left: 40px;
        text-decoration: none; color: var(--text-muted);
        display: flex; align-items: center; gap: 8px;
        font-weight: 600; font-size: 0.9rem; transition: color 0.3s;
        z-index: 20;
    }
    .back-link:hover { color: var(--primary); }

    .card {
      background: var(--card-bg);
      width: 100%; max-width: 440px;
      padding: 48px; border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border);
      position: relative; z-index: 10;
    }

    .brand { text-align: center; margin-bottom: 32px; }
    .brand h1 { font-size: 2rem; font-weight: 800; color: var(--text); }
    .brand span { color: var(--primary); }

    .form-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; color: var(--text); }
    .form-sub { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    input, select {
      width: 100%; padding: 14px 18px;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text); font-size: 0.95rem;
      transition: all 0.3s;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--primary);
      background: #fff; box-shadow: 0 0 0 4px rgba(122, 158, 191, 0.1);
    }

    .btn {
      width: 100%; padding: 16px; margin-top: 12px;
      background: var(--primary); color: #fff;
      font-weight: 700; border: none; border-radius: 14px;
      cursor: pointer; transition: all 0.3s;
      box-shadow: 0 10px 20px -5px rgba(122, 158, 191, 0.3);
    }
    .btn:hover { background: #6a8caf; transform: translateY(-2px); }

    .switch-ln { margin-top: 32px; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
    .switch-ln button { background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; margin-left: 4px; }
    .switch-ln button:hover { text-decoration: underline; }

    .msg { padding: 14px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 24px; display: none; text-align: center; }
    .msg.error { background: #fff5f5; color: #e53e3e; border: 1px solid #feb2b2; display: block; }

    #register-view { display: none; }
    .register-mode #login-view { display: none; }
    .register-mode #register-view { display: block; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .field-row .field { margin-bottom: 0; }

    .spinner {
      display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff; animation: spin 0.6s linear infinite; margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
  
  <div class="breeze-bg"></div>
  <div class="breeze-waves"></div>

  <a href="index.html" class="back-link">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Home
  </a>

  <div class="card" id="card">
    <div class="brand">
        <h1>Reincrew<span>.AI</span></h1>
    </div>

    <!-- Login View -->
    <div id="login-view">
      <div class="form-title">Sign In</div>
      <div class="form-sub">Sign in and continue your AI interview journey.</div>
      <div id="login-msg" class="msg"></div>
      <form onsubmit="doLogin(event)">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="login-btn">Sign In</button>
      </form>
      <div class="switch-ln">New here? <button type="button" onclick="toggleMode('register')">Create an account</button></div>
    </div>

    <!-- Register View -->
    <div id="register-view">
      <div class="form-title">Join Reincrew</div>
      <div class="form-sub">Register and master every interview with AI.</div>
      <div id="reg-msg" class="msg"></div>
      <form onsubmit="doRegister(event)">
        <div class="field-row">
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required autocomplete="name">
            </div>
            <div class="field">
                <label>I am a...</label>
                <select id="reg-role" required>
                    <option value="candidate">Candidate</option>
                    <option value="admin">Admin / HR</option>
                </select>
            </div>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label>Create Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="reg-btn">Create Account</button>
      </form>
      <div class="switch-ln">Already have an account? <button type="button" onclick="toggleMode('login')">Sign in</button></div>
    </div>

  </div>

  <script>
    const API = 'http://127.0.0.1:5555';
    
    /* Session Guard */
    (function(){
      const tok = localStorage.getItem('token');
      if (tok) {
        if (localStorage.getItem('onboarded') === '0') { location.href='onboarding.html'; }
        else { location.href = localStorage.getItem('role') === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html'; }
      }
    })();

    /* Handle Mode Toggle */
    function toggleMode(mode) {
      const card = document.getElementById('card');
      if (mode === 'register') {
        document.body.classList.add('register-mode');
      } else {
        document.body.classList.remove('register-mode');
      }
      // Clear messages
      document.getElementById('login-msg').style.display = 'none';
      document.getElementById('reg-msg').style.display = 'none';
    }

    /* URL Param Toggle */
    if (new URLSearchParams(location.search).get('tab') === 'register') {
      toggleMode('register');
    }

    /* API Helpers */
    function showMsg(id, txt, type) {
      const el = document.getElementById(id);
      el.textContent = txt;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    function setLoad(btn, on) {
      if (on) {
        btn.disabled = true;
        btn.dataset.t = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span>Please wait...';
      } else {
        btn.disabled = false;
        btn.textContent = btn.dataset.t;
      }
    }

    function saveSession(d) {
      localStorage.setItem('token', d.token);
      localStorage.setItem('userId', d.user.id);
      localStorage.setItem('userName', d.user.name);
      localStorage.setItem('userEmail', d.user.email);
      localStorage.setItem('role', d.user.role);
      localStorage.setItem('onboarded', d.user.onboarded || 0);
    }

    function redirectUser(user) {
      if (user.onboarded === 0 || user.onboarded === '0') {
        location.href = 'onboarding.html';
      } else {
        location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
      }
    }

    /* Authentication Actions */
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      setLoad(btn, true);
      try {
        const r = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const d = await r.json();
        if (!d.success) { showMsg('login-msg', d.error, 'error'); return; }
        saveSession(d.data);
        redirectUser(d.data.user);
      } catch {
        showMsg('login-msg', 'Cannot connect to server. Ensure backend is running.', 'error');
      } finally {
        setLoad(btn, false);
      }
    }

    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      setLoad(btn, true);
      try {
        const r = await fetch(API + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
            role: document.getElementById('reg-role').value,
          })
        });
        const d = await r.json();
        if (!d.success) { showMsg('reg-msg', d.error, 'error'); return; }
        saveSession(d.data);
        redirectUser(d.data.user);
      } catch {
        showMsg('reg-msg', 'Cannot connect to server. Ensure backend is running.', 'error');
      } finally {
        setLoad(btn, false);
      }
    }
  </script>
</body>
</html>
